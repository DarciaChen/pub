<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Darcia · 工具庫</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #21262d; --border-hi: #30363d;
      --text: #e6edf3; --muted: #7d8590; --accent: #58a6ff;
      --tag-html: #f78166; --tag-gh: #58a6ff; --tag-script: #7ee787;
      --tag-firebase: #e3b341; --tag-link: #bc8cff;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; padding: 28px 16px 60px; }

    header { max-width: 720px; margin: 0 auto 28px; display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; }
    .logo { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 20px; color: var(--accent); }
    .logo span { color: var(--muted); }
    .subtitle { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .count { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted); }

    /* Filter tabs */
    .filters { max-width: 720px; margin: 0 auto 20px; display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn {
      font-size: 12px; font-family: 'JetBrains Mono', monospace;
      padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--border-hi); color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #0d1117; font-weight: 600; }

    /* List */
    .list { max-width: 720px; margin: 0 auto; display: flex; flex-direction: column; gap: 8px; }

    .item {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 15px 18px; display: flex; align-items: center; gap: 14px;
      text-decoration: none; color: inherit; transition: border-color 0.15s;
    }
    .item:hover { border-color: var(--accent); }
    .item.hidden { display: none; }

    .tag {
      font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600;
      padding: 3px 7px; border-radius: 5px; flex-shrink: 0; min-width: 64px; text-align: center;
    }
    .tag-html     { background: #f7816622; color: var(--tag-html); }
    .tag-script   { background: #7ee78722; color: var(--tag-script); }
    .tag-firebase { background: #e3b34122; color: var(--tag-firebase); }
    .tag-link     { background: #bc8cff22; color: var(--tag-link); }

    .info { flex: 1; overflow: hidden; }
    .name { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .meta { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; margin-top: 3px; }
    .arrow { color: var(--muted); font-size: 16px; flex-shrink: 0; }

    .empty { text-align: center; color: var(--muted); padding: 60px 0; font-size: 13px; display: none; }
    .empty.show { display: block; }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">darcia<span>/</span>工具庫</div>
    <div class="subtitle">所有 Claude 產出的工具與頁面</div>
  </div>
  <div class="count" id="count"></div>
</header>

<div class="filters">
  <button class="filter-btn active" data-filter="all">全部</button>
  <button class="filter-btn" data-filter="html">HTML 工具</button>
  <button class="filter-btn" data-filter="script">Apps Script</button>
  <button class="filter-btn" data-filter="firebase">Firebase App</button>
  <button class="filter-btn" data-filter="link">外部連結</button>
</div>

<div class="list" id="list"></div>
<div class="empty" id="empty">沒有符合的項目</div>

<script>
// ── REGISTRY ── 由 Claude 自動維護，請勿手動編輯
const ITEMS = [
  {"type":"html","name":"Loopr","url":"https://darciachen.github.io/loopr-RC-50/loopr.html","date":"2026-06-15","desc":"多軌混音工具"},
  {"type":"html","name":"P50 校準工具","file":"p50-cal.html","date":"2026-06-14","desc":"機率校準練習工具"},
  {"type":"html","name":"發布測試頁","file":"test.html","date":"2026-06-14","desc":"系統測試用"},
  {"type":"firebase","name":"作戰中心 Work Command Center","url":"https://darciachen.github.io/work-center","date":"2026-06-15","desc":"AI 工作管理系統 · 語音記錄 · 任務追蹤 · 供應鏈 · 業務"},
  {"type":"script","name":"工控儀表業務客戶拜訪系統","url":"https://script.google.com/macros/s/AKfycbydqPmPdiwHUIiZjDL4yYxXl7YLuULCkZhTTjpKmH1h1uEbukAju548xSGExLKmM8A7/exec","date":"2026-06-16","desc":"客戶拜訪紀錄 · 今日排程 · 前購搜尋 · AI 解析 · v4.5"},
  {"type":"html","name":"電子鋼琴 / 吉他模擬器","file":"piano-guitar.html","date":"2026-06-21","desc":"3音域鍵盤+吉他模式 · K-S物理建模木吉他音色 · 13和弦11撥弦模式 · 節拍器/鼓組 · 和弦循環"},
  {"type":"html","name":"唸給我聽 · 文字朗讀","file":"voice-reader.html","date":"2026-06-22","desc":"輸入文字即朗讀 · 瀏覽器內建女聲 · 可調速度音調 · 無需安裝"}
];

const BASE = 'https://darciachen.github.io/pub/';

const TAG_LABEL = { html: 'HTML', script: 'Apps Script', firebase: 'Firebase', link: '外部連結' };

function getUrl(item) {
  if (item.url) return item.url;
  if (item.file) return BASE + item.file;
  return '#';
}

const listEl = document.getElementById('list');
const emptyEl = document.getElementById('empty');
const countEl = document.getElementById('count');

function render(filter) {
  const filtered = ITEMS.filter(i => filter === 'all' || i.type === filter).slice().reverse();
  countEl.textContent = filter === 'all' ? `${ITEMS.length} 個項目` : `${filtered.length} / ${ITEMS.length}`;

  if (!filtered.length) {
    listEl.innerHTML = '';
    emptyEl.classList.add('show');
    return;
  }
  emptyEl.classList.remove('show');
  listEl.innerHTML = filtered.map(item => `
    <a class="item" href="${getUrl(item)}" target="_blank">
      <span class="tag tag-${item.type}">${TAG_LABEL[item.type] || item.type}</span>
      <div class="info">
        <div class="name">${item.name}</div>
        <div class="meta">${item.date}${item.desc ? ' · ' + item.desc : ''}</div>
      </div>
      <span class="arrow">↗</span>
    </a>`).join('');
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(btn.dataset.filter);
  });
});

render('all');
</script>
</body>
</html>
