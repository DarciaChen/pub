<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Darcia · 發布紀錄</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #21262d;
      --text: #e6edf3; --muted: #7d8590; --accent: #58a6ff;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; padding: 24px 16px; }

    header { max-width: 680px; margin: 0 auto 32px; }
    .logo { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 18px; color: var(--accent); margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: var(--muted); }

    .list { max-width: 680px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }

    .item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s;
    }
    .item:hover { border-color: var(--accent); }

    .ext {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      padding: 3px 7px;
      border-radius: 5px;
      flex-shrink: 0;
      background: #58a6ff22;
      color: var(--accent);
    }
    .info { flex: 1; overflow: hidden; }
    .name { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .date { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; margin-top: 3px; }
    .arrow { color: var(--muted); font-size: 16px; flex-shrink: 0; }

    .empty { text-align: center; color: var(--muted); padding: 60px 0; font-size: 14px; }
  </style>
</head>
<body>
<header>
  <div class="logo">darcia / pub</div>
  <div class="subtitle">Claude 發布的所有檔案</div>
</header>

<div class="list" id="list">
  <div class="empty">載入中…</div>
</div>

<script>
  // AUTO-GENERATED FILE LIST — DO NOT EDIT MANUALLY
  const FILES = [
    {"name":"p50-cal.html","date":"2026-06-14","description":"P50 calibration tool"},
    {"name":"test.html","date":"2026-06-14","description":"發布測試"}
  ];

  const base = 'https://darciacchen.github.io/pub/';
  const list = document.getElementById('list');

  if (!FILES.length) {
    list.innerHTML = '<div class="empty">還沒有發布任何檔案</div>';
  } else {
    list.innerHTML = FILES.slice().reverse().map(f => {
      const ext = f.name.split('.').pop().toUpperCase();
      return `
        <a class="item" href="${base}${f.name}" target="_blank">
          <span class="ext">${ext}</span>
          <div class="info">
            <div class="name">${f.description || f.name}</div>
            <div class="date">${f.date} · ${f.name}</div>
          </div>
          <span class="arrow">↗</span>
        </a>`;
    }).join('');
  }
</script>
</body>
</html>
